name: Stock Alert (R)

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Cache R packages
        uses: actions/cache@v3
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ hashFiles('**/config.yml') }}-${{ runner.os }}
          restore-keys: r-${{ runner.os }}-

      - name: Install system dependencies
        run: sudo apt-get install -y libssl-dev libcurl4-openssl-dev libcurl4 --fix-broken

      - name: Install R packages
        run: Rscript -e "install.packages(c('quantmod', 'emayili', 'yaml', 'purrr'), repos='https://cloud.r-project.org')"

      - name: Run stock alert
        run: Rscript stock_alert.R
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
